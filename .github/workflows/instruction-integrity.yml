name: Instruction Integrity

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Shell Syntax
        run: |
          set -euo pipefail
          while IFS= read -r -d '' script; do
            bash -n "$script"
          done < <(
            find . -maxdepth 1 -type f -name '*.sh' -print0
            find tools scripts -maxdepth 1 -type f -name '*.sh' -print0
          )

      - name: Sync Curated Cline Skill Mirrors
        run: |
          set -euo pipefail
          bash tools/sync_cline_skill_mirrors.sh
          git diff --exit-code -- .cline/skills

      - name: Validate Cline Skill Frontmatter
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          root = Path(".cline/skills")
          errors = []
          for skill_file in sorted(root.glob("*/SKILL.md")):
              name = skill_file.parent.name
              lines = skill_file.read_text(encoding="utf-8", errors="replace").splitlines()
              if not lines or lines[0].strip() != "---":
                  errors.append(f"{skill_file}: missing opening frontmatter delimiter")
                  continue
              close = None
              for i, line in enumerate(lines[1:], start=2):
                  if line.strip() == "---":
                      close = i
                      break
              if close is None:
                  errors.append(f"{skill_file}: missing closing frontmatter delimiter")
                  continue
              fm = "\n".join(lines[1:close - 1])
              name_m = re.search(r"(?m)^name:\s*(.+?)\s*$", fm)
              desc_m = re.search(r"(?m)^description:\s*(.+?)\s*$", fm)
              if not name_m:
                  errors.append(f"{skill_file}: missing name")
                  continue
              fm_name = name_m.group(1).strip().strip('"').strip("'")
              if fm_name != name:
                  errors.append(f"{skill_file}: frontmatter name '{fm_name}' must match directory '{name}'")
              if not re.fullmatch(r"[a-z0-9]+(?:-[a-z0-9]+)*", fm_name):
                  errors.append(f"{skill_file}: name '{fm_name}' is not kebab-case")
              if not desc_m:
                  errors.append(f"{skill_file}: missing description")
              else:
                  desc = desc_m.group(1).strip().strip('"').strip("'")
                  if len(desc) == 0:
                      errors.append(f"{skill_file}: empty description")
                  if len(desc) > 1024:
                      errors.append(f"{skill_file}: description exceeds 1024 chars")
          if errors:
              raise SystemExit("Cline skill frontmatter validation failed:\n - " + "\n - ".join(errors))
          print("Cline skill frontmatter validation passed.")
          PY

      - name: Run Baseline Audit
        run: |
          set -euo pipefail
          bash tools/audit_instruction_baselines.sh

      - name: Smoke Downstream Init And Verify
        run: |
          set -euo pipefail
          ENV_ROOT="$RUNNER_TEMP/delphi-env"
          STUB_ROOT="$RUNNER_TEMP/delphi-env-stubs"
          rm -rf "$ENV_ROOT" "$STUB_ROOT"
          mkdir -p "$ENV_ROOT" "$STUB_ROOT"

          create_stub_repo() {
            local repo_path="$1"
            mkdir -p "$repo_path"
            git init -q "$repo_path"
            git -C "$repo_path" config user.email ci@example.com
            git -C "$repo_path" config user.name "CI"
            printf '# %s\n' "$(basename "$repo_path")" > "$repo_path/README.md"
            git -C "$repo_path" add README.md
            git -C "$repo_path" commit -q -m "init"
          }

          create_stub_repo "$STUB_ROOT/foundation_documentation"
          create_stub_repo "$STUB_ROOT/flutter-app"
          create_stub_repo "$STUB_ROOT/laravel-app"
          create_stub_repo "$STUB_ROOT/web-app"

          git init -q "$ENV_ROOT"
          git -C "$ENV_ROOT" config user.email ci@example.com
          git -C "$ENV_ROOT" config user.name "CI"
          git -c protocol.file.allow=always -C "$ENV_ROOT" submodule add "$STUB_ROOT/foundation_documentation" foundation_documentation >/dev/null 2>&1
          git -c protocol.file.allow=always -C "$ENV_ROOT" submodule add "$STUB_ROOT/flutter-app" flutter-app >/dev/null 2>&1
          git -c protocol.file.allow=always -C "$ENV_ROOT" submodule add "$STUB_ROOT/laravel-app" laravel-app >/dev/null 2>&1
          git -c protocol.file.allow=always -C "$ENV_ROOT" submodule add "$STUB_ROOT/web-app" web-app >/dev/null 2>&1

          ln -s "$GITHUB_WORKSPACE" "$ENV_ROOT/delphi-ai"
          ln -s ../foundation_documentation "$ENV_ROOT/flutter-app/foundation_documentation"
          ln -s ../foundation_documentation "$ENV_ROOT/laravel-app/foundation_documentation"
          ln -s ../delphi-ai "$ENV_ROOT/flutter-app/delphi-ai"
          ln -s ../delphi-ai "$ENV_ROOT/laravel-app/delphi-ai"

          cat > "$ENV_ROOT/.env" <<'EOF'
          PROJECT_NAME=delphi_ci
          PROJECT_PREFIX=delphi_ci
          CERTBOT_EMAIL=ci@example.com
          EOF

          (cd "$ENV_ROOT" && bash delphi-ai/init.sh --check </dev/null)
          (cd "$ENV_ROOT" && bash delphi-ai/init.sh </dev/null)
          (cd "$ENV_ROOT" && bash delphi-ai/verify_context.sh)
          (cd "$ENV_ROOT" && bash delphi-ai/verify_adherence_sync.sh)
